  <body class="sm:overscroll-y-none no-scrollbar">
    <div id="app" class="h-full"></div>
  
          <script>
              {% for key in boot %}
              window["{{ key }}"] = {{ boot[key] | tojson }};
              {% endfor %}
          </script>
          <style>
            .aionion-hidden-link {
                display: none !important;
            }
            /* Hide the CRM Brand Logo Icon at the top of the sidebar */
            .p-2 button .h-8.max-w-16 {
                display: none !important;
            }

            /* ========================================================================= */
            /* 1. SIDEBAR LIGHT THEME                                                    */
            /* ========================================================================= */
            
            /* Clean Sidebar Background & Border */
            .h-full.border-r.bg-surface-gray-1 {
                background-color: #F8FAFC !important; /* Soft premium slate-50 */
                border-right: 1px solid #E2E8F0 !important;
            }

            /* Active Sidebar Item */
            nav.flex-col > button.bg-white,
            nav.flex-col > button.shadow-sm,
            nav.flex-col > button.text-ink-gray-9 {
                background-color: rgba(255, 107, 53, 0.08) !important; /* Soft Aionion Orange bg */
                color: var(--brand-color, #FF6B35) !important;
                box-shadow: none !important;
                border-right: 3px solid var(--brand-color, #FF6B35) !important; /* Accent border on the right */
                border-radius: 6px !important;
                font-weight: 600 !important;
            }

            /* Inactive Sidebar Items Hover */
            nav.flex-col > button:not(.bg-white):hover {
                background-color: #F1F5F9 !important; /* slate-100 */
                color: #334155 !important;
            }

            /* Ensure active SVGs inherit color */
            nav.flex-col > button.bg-white svg,
            nav.flex-col > button.shadow-sm svg,
            nav.flex-col > button.text-ink-gray-9 svg {
                color: inherit !important;
            }

            /* Clean up User Dropdown (Hide redundant "CRM" text) */
            .p-2 button > div.flex-col > div.text-base-medium {
                display: none !important;
            }
            .p-2 button > div.flex-col > div.text-sm {
                margin-top: 0 !important;
                font-weight: 500 !important;
                color: #334155 !important;
            }

            /* Ensure main body area scrolls properly */
            #app > div.flex.h-screen.w-screen > div.flex-1 {
                overflow-y: auto !important;
            }

            /* ========================================================================= */
            /* 2. DASHBOARD & LIST VIEW BRAND THEMING                                    */
            /* ========================================================================= */

            /* Redefine root CSS variables */
            :root {
                --brand-color: #FF6B35 !important;
                --text-brand: #FF6B35 !important;
                --bg-brand: #FF6B35 !important;
                --bg-brand-hover: #E85D2A !important;
                --border-brand: #FF6B35 !important;
                --bg-surface-gray-1: #ffffff !important;
                --bg-surface-base: #F8FAFC !important; /* Overrides Frappe UI main background to soft slate! */
            }

            /* Restyle Primary Solid Buttons (like + Create) */
            button.bg-gray-900, 
            button.bg-surface-gray-9,
            button.bg-surface-gray-8,
            button[class*="bg-gray-900"],
            button[class*="bg-surface-gray-9"] {
                background-color: #FF6B35 !important;
                color: #ffffff !important;
                border-color: #FF6B35 !important;
                box-shadow: 0 4px 12px rgba(255, 107, 53, 0.25) !important;
                border-radius: 8px !important;
                transition: all 0.2s ease-in-out !important;
            }
            
            button[class*="bg-gray-900"]:hover,
            button[class*="bg-surface-gray-9"]:hover {
                background-color: #E85D2A !important;
                border-color: #E85D2A !important;
                transform: translateY(-1px) !important;
                box-shadow: 0 6px 16px rgba(255, 107, 53, 0.35) !important;
            }

            /* Dashboard Grid Cards Restyling */
            .crm-dashboard .grid > div,
            .grid > div.bg-surface-white,
            .grid > div.bg-white,
            div[class*="shadow-sm"] {
                border: 1px solid rgba(255, 107, 53, 0.15) !important;
                border-top: 3px solid #FF6B35 !important;
                border-radius: 12px !important;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03) !important;
                background: #ffffff !important;
                transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out !important;
            }
            
            .crm-dashboard .grid > div:hover,
            .grid > div.bg-surface-white:hover,
            .grid > div.bg-white:hover {
                transform: translateY(-2px) !important;
                box-shadow: 0 10px 15px -3px rgba(255, 107, 53, 0.15) !important;
            }

            /* Force Inputs and Filter Buttons to be Pills */
            input,
            select,
            button[class*="bg-surface-gray-2"],
            button[class*="border-outline-gray-2"] {
                border-radius: 9999px !important;
            }

            /* Inputs Focus State */
            input:focus,
            select:focus {
                border-color: #FF6B35 !important;
                box-shadow: 0 0 0 2px rgba(255, 107, 53, 0.15) !important;
            }

            /* Empty State Icons (Frappe UI usually uses a large SVG inside a flex column) */
            .flex-col > svg,
            svg.w-12.h-12,
            svg[class*="w-10"],
            svg[class*="w-12"] {
                color: #FF6B35 !important;
            }
            
            /* Specific fix for "No Leads Found" icon size class */
            div.text-ink-gray-5 > svg {
                color: #FF6B35 !important;
                opacity: 0.9 !important;
                transform: scale(1.1) !important;
            }

            /* Highlight specific icons with Brand Color */
            .text-ink-gray-5 svg,
            .text-ink-gray-7 svg {
                color: #FF6B35 !important;
            }
            
            /* Keep Nav icons a bit more muted unless active */
            .h-full.border-r nav.flex-col > button:hover svg {
                color: #FF6B35 !important;
            }
          </style>
          <script>
            function aionionGlobalScript() {
                // 1. Hide Links Safely
                let spans = document.querySelectorAll('span.truncate');
                spans.forEach(span => {
                    let text = (span.textContent || "").trim();
                    if (text === "Deals" || text === "Contacts" || text === "Organizations") {
                        let btn = span.closest('button');
                        if (btn) {
                            btn.classList.add('aionion-hidden-link');
                        }
                    }
                });

                // 2. Change Notification Bell Color
                let notifBtn = document.getElementById('notifications-btn');
                if (notifBtn) {
                    let svg = notifBtn.querySelector('svg');
                    if (svg) svg.style.color = '#FF6B35';
                    let dot = notifBtn.querySelector('circle') || notifBtn.querySelector('.bg-surface-gray-9');
                    if (dot) {
                        dot.style.fill = '#FF6B35';
                        dot.style.backgroundColor = '#FF6B35';
                    }
                }
            }
            setInterval(aionionGlobalScript, 500);
          </script>
