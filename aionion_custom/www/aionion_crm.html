  <body class="sm:overscroll-y-none no-scrollbar">
    <div id="app" class="h-full"></div>
  
          <script>
              {% for key in boot %}
              window["{{ key }}"] = {{ boot[key] | tojson }};
              {% endfor %}
          </script>
          <style>
            /* ===================================================
               AIONION CRM — CLEAN MINIMAL THEME
               Inspired by Vercel / Apple / Linear
               White base, blue accents, zero noise
            =================================================== */

            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

            *, *::before, *::after {
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
                -webkit-font-smoothing: antialiased !important;
            }

            /* Hidden links */
            .aionion-hidden-link { display: none !important; }

            /* Hide CRM logo icon */
            .p-2 button .h-8.max-w-16 { display: none !important; }

            /* === SIDEBAR ========================================= */

            /* Sidebar — subtle slate background */
            .h-full.border-r {
                background-color: #F8FAFC !important; /* Soft slate-50 */
                border-right: 1px solid #E2E8F0 !important;
                box-shadow: none !important;
                transition: width 0.3s ease !important;
                overflow: hidden !important;
                position: relative;
            }

            /* Collapsed Sidebar State */
            .aionion-sidebar-collapsed {
                width: 72px !important;
            }
            .aionion-sidebar-collapsed span.truncate {
                display: none !important;
            }
            .aionion-sidebar-collapsed #aionion-logo-wrap img {
                display: none !important;
            }
            /* Hide only the user profile dropdown in collapsed state */
            .aionion-sidebar-collapsed .aionion-user-dropdown {
                display: none !important;
            }
            
            /* Simple Nav Icon Centering */
            .aionion-sidebar-collapsed span.truncate {
                display: none !important;
            }
            .aionion-sidebar-collapsed nav {
                align-items: center !important;
            }
            .aionion-sidebar-collapsed nav > * {
                display: flex !important;
                justify-content: center !important;
                width: 100% !important;
                padding-left: 0 !important;
                padding-right: 0 !important;
            }

            /* Center Hamburger Menu */
            .aionion-hamburger {
                cursor: pointer;
                color: #64748B;
                transition: color 0.2s;
                padding: 8px;
                margin-left: auto;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 6px;
            }
            .aionion-hamburger:hover {
                color: #0F172A;
                background-color: #F1F5F9;
            }
            .aionion-sidebar-collapsed .aionion-hamburger {
                margin: 0 auto;
            }
            .aionion-sidebar-collapsed #aionion-logo-wrap {
                padding: 16px 0 !important;
                justify-content: center !important;
            }

            /* Active item — subtle blue fill, bold blue text */
            nav.flex-col > button.bg-white,
            nav.flex-col > button.shadow-sm,
            nav.flex-col > button.text-ink-gray-9 {
                background-color: #EFF6FF !important;
                color: #2563EB !important;
                font-weight: 600 !important;
                box-shadow: none !important;
                border-radius: 6px !important;
            }
            nav.flex-col > button.bg-white svg,
            nav.flex-col > button.shadow-sm svg,
            nav.flex-col > button.text-ink-gray-9 svg {
                color: #2563EB !important;
            }

            /* Inactive item hover — whisper of gray */
            nav.flex-col > button:not(.bg-white):not(.shadow-sm):hover {
                background-color: #F5F5F5 !important;
                color: #111 !important;
                border-radius: 6px !important;
            }

            /* User dropdown — hide "CRM" app name */
            .p-2 button > div.flex-col > div.text-base-medium { display: none !important; }
            .p-2 button > div.flex-col > div.text-sm {
                margin-top: 0 !important;
                font-weight: 500 !important;
                color: #111 !important;
            }

            /* === MAIN CONTENT AREA ============================== */

            #app > div.flex.h-screen.w-screen > div.flex-1 {
                overflow-y: auto !important;
                background-color: #ffffff !important;
            }

            /* === PAGE HEADER BAR ================================= */
            /* Keep it plain white — no gradient */
            .sticky.top-0 {
                background-color: #ffffff !important;
                border-bottom: 1px solid #EBEBEB !important;
                box-shadow: none !important;
            }

            /* === BUTTONS ======================================== */
            /* Dark primary buttons → Royal Blue, clean */
            button.bg-gray-900,
            button.bg-surface-gray-9,
            button[class*="bg-gray-900"],
            button[class*="bg-surface-gray-9"],
            button[class*="bg-surface-gray-8"] {
                background-color: #2563EB !important;
                border-color: #2563EB !important;
                color: #fff !important;
                border-radius: 7px !important;
                box-shadow: none !important;
                font-weight: 500 !important;
                letter-spacing: -0.01em !important;
                transition: background-color 0.15s ease !important;
            }
            button.bg-gray-900:hover,
            button[class*="bg-surface-gray-9"]:hover {
                background-color: #1D4ED8 !important;
            }

            /* === INPUTS ========================================= */
            input, select {
                border-radius: 7px !important;
                transition: border-color 0.15s, box-shadow 0.15s !important;
            }
            input:focus, select:focus {
                border-color: #2563EB !important;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12) !important;
                outline: none !important;
            }

            /* === LIST TABLE ===================================== */
            /* Column headers — subtle uppercase */
            [class*="list-header"] * { 
                font-size: 11px !important;
                font-weight: 600 !important;
                letter-spacing: 0.04em !important;
                text-transform: uppercase !important;
                color: #888 !important;
            }

            /* === DASHBOARD CARDS ================================ */
            .grid > div.bg-surface-white,
            .grid > div.bg-white {
                border: 1px solid #EBEBEB !important;
                border-radius: 10px !important;
                box-shadow: none !important;
                background: #ffffff !important;
                transition: box-shadow 0.15s ease !important;
            }
            .grid > div.bg-surface-white:hover,
            .grid > div.bg-white:hover {
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07) !important;
            }

            /* === EMPTY STATE ==================================== */
            .flex-col > svg,
            svg.w-12.h-12,
            svg[class*="w-10"],
            div.text-ink-gray-5 > svg {
                color: #2563EB !important;
                opacity: 0.7 !important;
            }

            /* === SCROLLBAR ====================================== */
            ::-webkit-scrollbar { width: 5px; height: 5px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #E0E0E0; border-radius: 99px; }
            ::-webkit-scrollbar-thumb:hover { background: #BDBDBD; }
          </style>


          <script>
            // ==========================================================
            // AIONION MINIMAL THEME SCRIPT
            // Runs every 500ms — gracefully applies Royal Blue branding
            // ==========================================================
            const BRAND      = '#2563EB';
            const BRAND_DARK = '#1D4ED8';

            function aionionApply() {
                // 1. Hide unwanted sidebar links
                document.querySelectorAll('span.truncate').forEach(span => {
                    const text = (span.textContent || '').trim();
                    if (text === 'Deals' || text === 'Contacts' || text === 'Organizations') {
                        const btn = span.closest('button, a');
                        if (btn) btn.classList.add('aionion-hidden-link');
                    }
                });

                // 2. Notification bell icon → Blue
                const notifBtn = document.getElementById('notifications-btn');
                if (notifBtn) {
                    const svg = notifBtn.querySelector('svg');
                    if (svg) svg.style.color = BRAND;
                }

                // 3. Inject Logo into Sidebar
                const sidebarContainer = document.querySelector('.h-full.border-r');
                if (sidebarContainer && !document.getElementById('aionion-logo-wrap')) {
                    sidebarContainer.style.display = 'flex';
                    sidebarContainer.style.flexDirection = 'column';

                    const logoWrap = document.createElement('div');
                    logoWrap.id = 'aionion-logo-wrap';
                    logoWrap.style.padding = '24px 20px 12px 20px';
                    logoWrap.style.display = 'flex';
                    logoWrap.style.alignItems = 'center';
                    logoWrap.style.justifyContent = 'center'; // Center the logo
                    
                    // Logo Image
                    const img = document.createElement('img');
                    img.src = '/assets/aionion_custom/images/logo.png';
                    img.style.maxHeight = '32px';
                    img.style.width = 'auto';
                    img.style.objectFit = 'contain';
                    
                    logoWrap.appendChild(img);
                    sidebarContainer.insertBefore(logoWrap, sidebarContainer.firstChild);

                    // Add a flexible spacer if needed, but Frappe UI usually handles content.
                    // Let's add the toggle at the very bottom.
                    const bottomWrap = document.createElement('div');
                    bottomWrap.style.marginTop = 'auto'; // Push to bottom
                    bottomWrap.style.padding = '12px';
                    bottomWrap.style.borderTop = '1px solid #EBEBEB';

                    const toggle = document.createElement('button');
                    toggle.className = 'aionion-sidebar-toggle-btn w-full flex items-center justify-center text-ink-gray-5 hover:bg-surface-gray-2 rounded';
                    toggle.style.padding = '8px';
                    toggle.style.transition = 'all 0.2s';
                    
                    // Icon
                    toggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>';
                    
                    toggle.onclick = () => {
                        sidebarContainer.classList.toggle('aionion-sidebar-collapsed');
                        if (sidebarContainer.classList.contains('aionion-sidebar-collapsed')) {
                            localStorage.setItem('aionion-sidebar-state', 'collapsed');
                        } else {
                            localStorage.setItem('aionion-sidebar-state', 'expanded');
                        }
                    };
                    
                    if (localStorage.getItem('aionion-sidebar-state') === 'collapsed') {
                        sidebarContainer.classList.add('aionion-sidebar-collapsed');
                    }
                    
                    bottomWrap.appendChild(toggle);
                    sidebarContainer.appendChild(bottomWrap);
                }

                // 3.5 Tag user dropdown safely for collapsing
                const userBtnText = document.querySelector('.p-2 button div.text-sm');
                if (userBtnText) {
                    const userBtn = userBtnText.closest('button');
                    if (userBtn) userBtn.classList.add('aionion-user-dropdown');
                }

                // 3.6 Hide Breadcrumbs ("Leads /")
                document.querySelectorAll('span, div, p').forEach(el => {
                    if (el.textContent.trim() === '/') {
                        el.style.display = 'none';
                        if (el.previousElementSibling) {
                            el.previousElementSibling.style.display = 'none';
                        }
                    }
                });

                // 4. Dark primary buttons → Royal Blue
                document.querySelectorAll('button').forEach(btn => {
                    if (btn.dataset.ai) return; // already processed
                    const bg = window.getComputedStyle(btn).backgroundColor;
                    const isDark =
                        bg === 'rgb(17, 24, 39)'  || // Tailwind gray-900
                        bg === 'rgb(24, 24, 27)'  || // zinc-900
                        bg === 'rgb(9, 9, 11)'    || // zinc-950
                        bg === 'rgb(31, 41, 55)'  || // gray-800
                        bg === 'rgb(15, 23, 42)';    // slate-900
                    if (isDark) {
                        btn.dataset.ai = '1';
                        btn.style.setProperty('background-color', BRAND, 'important');
                        btn.style.setProperty('border-color', BRAND, 'important');
                        btn.style.setProperty('color', '#fff', 'important');
                        btn.style.setProperty('border-radius', '7px', 'important');
                        btn.style.setProperty('font-weight', '500', 'important');
                        btn.addEventListener('mouseover', () => btn.style.setProperty('background-color', BRAND_DARK, 'important'));
                        btn.addEventListener('mouseout',  () => btn.style.setProperty('background-color', BRAND,      'important'));
                    }
                });

                // 5. Inputs → Blue focus ring
                document.querySelectorAll('input[type="text"], input:not([type]), input[type="search"]').forEach(el => {
                    if (el.dataset.ai) return;
                    el.dataset.ai = '1';
                    el.style.setProperty('border-radius', '7px', 'important');
                    el.addEventListener('focus', () => {
                        el.style.setProperty('border-color', BRAND, 'important');
                        el.style.setProperty('box-shadow', '0 0 0 3px rgba(37,99,235,0.12)', 'important');
                    });
                    el.addEventListener('blur', () => {
                        el.style.removeProperty('border-color');
                        el.style.removeProperty('box-shadow');
                    });
                });

                // 6. Empty state SVGs → Blue
                document.querySelectorAll('svg').forEach(svg => {
                    if (svg.dataset.ai) return;
                    const rect = svg.getBoundingClientRect();
                    if (rect.width >= 32 && rect.width <= 80 && rect.height >= 32) {
                        if (svg.closest('.flex-col')) {
                            svg.dataset.ai = '1';
                            svg.style.setProperty('color', BRAND, 'important');
                            svg.style.setProperty('opacity', '0.7', 'important');
                        }
                    }
                });
            }

            setInterval(aionionApply, 400);
          </script>
